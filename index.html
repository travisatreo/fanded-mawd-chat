<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MAWD — Your Chief of Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07070F;
  --bg-bottom:#0A0A18;
  --cream:#F5F1EA;
  --cream-60:rgba(245,241,234,0.6);
  --cream-40:rgba(245,241,234,0.4);
  --cream-30:rgba(245,241,234,0.3);
  --gold:#C4953A;
  --gold-2:#E8B84B;
  --purple:#7C3AED;
  --blue:#3BADE4;
  --card:#0D0D1A;
  --border:rgba(196,149,58,0.2);
  --font-h:'Playfair Display',Georgia,serif;
  --font-ui:'DM Sans',system-ui,sans-serif;
  --dollar:#C4953A;
  --pulse:#7C3AED;
  --scout:#0D9488;
  --compass:#3B82F6;
  --hype:#EC4899;
  --ledger:#22C55E;
}
html,body{
  height:100%;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg-bottom) 100%);
  color:var(--cream);
  font-family:var(--font-ui);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
body{display:flex;justify-content:center;}
#app{
  width:100%;max-width:430px;height:100%;
  display:flex;flex-direction:column;position:relative;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg-bottom) 100%);
}
/* ── TOP BAR ── */
#topBar{
  flex-shrink:0;padding:12px 16px 0;
  padding-top:max(12px,env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10;
}
#topBar .logo{display:flex;align-items:center;gap:6px;}
#topBar .logo img{width:22px;height:22px;border-radius:6px;}
#topBar .logo span{
  font-family:'Bricolage Grotesque','DM Sans',sans-serif;
  font-weight:800;font-size:14px;color:var(--gold);
  text-transform:lowercase;letter-spacing:0.3px;
}
#topBar .title{
  font-family:'Space Grotesk',sans-serif;
  font-weight:500;font-size:17px;color:var(--cream);letter-spacing:3px;
}
.agent-dots{display:flex;gap:5px;align-items:center;}
.agent-dot{
  width:7px;height:7px;border-radius:50%;opacity:0.4;
  transition:opacity 0.4s,box-shadow 0.4s;
}
.agent-dot.active{opacity:1;animation:dotPulse 2s ease-in-out infinite;}
.agent-dot[data-agent="dollar"]{background:var(--dollar);}
.agent-dot[data-agent="pulse"]{background:var(--pulse);}
.agent-dot[data-agent="scout"]{background:var(--scout);}
.agent-dot[data-agent="compass"]{background:var(--compass);}
.agent-dot[data-agent="hype"]{background:var(--hype);}
.agent-dot[data-agent="ledger"]{background:var(--ledger);}
@keyframes dotPulse{
  0%,100%{box-shadow:0 0 0 0 currentColor;}
  50%{box-shadow:0 0 6px 2px currentColor;}
}
#gradLine{flex-shrink:0;height:2px;width:100%;background:linear-gradient(90deg,var(--gold),var(--purple));margin-top:10px;}
/* ── STATUS PILL ── */
#statusPill{flex-shrink:0;display:flex;justify-content:center;padding:10px 0 6px;}
#statusPill .pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(196,149,58,0.15);border:1px solid rgba(196,149,58,0.3);
  border-radius:50px;padding:5px 14px;font-size:11px;color:var(--gold);font-family:var(--font-ui);
}
#statusPill .pill .dot{
  width:6px;height:6px;border-radius:50%;background:var(--gold);
  animation:statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
/* ── CHAT AREA ── */
#chatArea{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:12px 16px 8px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;
}
#chatArea::-webkit-scrollbar{width:0;display:none;}
.msg-wrap{
  margin-bottom:16px;opacity:0;transform:translateY(12px);
  animation:msgIn 0.3s ease-out forwards;
}
@keyframes msgIn{to{opacity:1;transform:translateY(0);}}
/* MAWD message */
.msg-mawd{display:flex;gap:10px;align-items:flex-start;}
.mawd-avatar{
  width:28px;height:28px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:Arial Black,'Arial Bold',Arial,sans-serif;
  font-size:12px;color:var(--cream);flex-shrink:0;margin-top:18px;
}
.mawd-content{flex:1;max-width:85%;}
.agent-label{
  font-family:var(--font-ui);font-size:9px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;padding-left:2px;
}
.mawd-bubble{
  background:var(--card);border:1px solid rgba(196,149,58,0.15);
  border-radius:4px 16px 16px 16px;padding:14px 16px;
  font-family:'Space Grotesk',sans-serif;font-weight:400;
  font-size:15px;line-height:1.65;color:var(--cream);
}
.mawd-bubble .typing-cursor{
  display:inline-block;width:2px;height:18px;background:var(--gold);
  margin-left:2px;vertical-align:text-bottom;
  animation:cursorBlink 0.6s step-end infinite;
}
@keyframes cursorBlink{0%,100%{opacity:1;}50%{opacity:0;}}
/* Talent message */
.msg-talent{display:flex;justify-content:flex-end;}
.talent-bubble{
  background:rgba(196,149,58,0.12);border:1px solid rgba(196,149,58,0.25);
  border-radius:16px 4px 16px 16px;padding:12px 16px;
  font-family:var(--font-ui);font-size:15px;color:var(--cream);
  max-width:80%;line-height:1.5;
}
/* Timestamp */
.timestamp{
  text-align:center;font-size:10px;color:var(--cream-40);
  font-family:var(--font-ui);margin:16px 0 12px;
}
/* Quick replies */
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-left:38px;}
.qr-btn{
  background:rgba(196,149,58,0.08);border:1px solid rgba(196,149,58,0.3);
  color:var(--cream);font-family:var(--font-ui);font-size:13px;
  padding:8px 16px;border-radius:50px;cursor:pointer;
  transition:all 0.2s ease;-webkit-tap-highlight-color:transparent;
}
.qr-btn:hover{background:rgba(196,149,58,0.15);border-color:var(--gold);}
.qr-btn:active,.qr-btn.selected{background:rgba(196,149,58,0.2);border-color:var(--gold);}
/* Thinking */
.thinking-wrap{
  display:flex;gap:10px;align-items:flex-start;margin-bottom:16px;
  opacity:0;animation:msgIn 0.3s ease-out forwards;
}
.thinking-content{display:flex;flex-direction:column;gap:6px;padding-top:18px;}
.thinking-dots{display:flex;gap:5px;padding-left:4px;}
.thinking-dots span{
  width:8px;height:8px;border-radius:50%;
  animation:bounce 1.2s ease-in-out infinite;
}
.thinking-dots span:nth-child(2){animation-delay:0.15s;}
.thinking-dots span:nth-child(3){animation-delay:0.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-8px);}}
.thinking-label{
  font-size:11px;font-style:italic;font-family:var(--font-ui);
  color:var(--cream-60);padding-left:2px;
}
/* ── JARGON TOOLTIPS ── */
.jargon{
  color:var(--gold-2);text-decoration:underline;text-decoration-style:dotted;
  text-underline-offset:3px;text-decoration-color:rgba(232,184,75,0.4);
  cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;
}
.jargon-tip{
  position:fixed;z-index:100;background:#13132A;
  border:1px solid rgba(196,149,58,0.35);border-radius:12px;
  padding:12px 14px;max-width:280px;width:max-content;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  opacity:0;transform:translateY(6px);
  transition:opacity 0.2s ease,transform 0.2s ease;pointer-events:none;
}
.jargon-tip.visible{opacity:1;transform:translateY(0);pointer-events:auto;}
.jargon-tip .tip-term{
  font-family:var(--font-ui);font-weight:700;font-size:11px;
  color:var(--gold);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px;
}
.jargon-tip .tip-def{font-family:var(--font-ui);font-size:13px;line-height:1.5;color:var(--cream);}
.jargon-tip .tip-link{
  display:inline-block;margin-top:6px;font-family:var(--font-ui);font-size:11px;
  color:var(--gold);text-decoration:none;opacity:0.7;transition:opacity 0.15s;
}
.jargon-tip .tip-link:hover{opacity:1;}
.jargon-tip .tip-close{
  position:absolute;top:6px;right:8px;background:none;border:none;
  color:var(--cream-40);font-size:16px;cursor:pointer;line-height:1;padding:2px;
}
/* ── INPUT BAR ── */
#inputBar{
  flex-shrink:0;background:var(--bg);border-top:1px solid var(--border);
  padding:12px 16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 12px);
  display:flex;align-items:center;gap:10px;
}
#inputBar .mic-btn{
  background:none;border:none;cursor:pointer;color:var(--gold);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;width:24px;height:24px;
  -webkit-tap-highlight-color:transparent;
}
#inputBar .mic-btn svg{width:20px;height:20px;}
#inputBar input{
  flex:1;background:rgba(245,241,234,0.06);border:1px solid rgba(196,149,58,0.2);
  border-radius:50px;padding:10px 16px;color:var(--cream);
  font-family:var(--font-ui);font-size:15px;outline:none;transition:border-color 0.2s;
}
#inputBar input::placeholder{color:var(--cream-30);}
#inputBar input:focus{border-color:rgba(196,149,58,0.5);}
#inputBar .send-btn{
  width:32px;height:32px;border-radius:50%;background:var(--gold);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform 0.15s,opacity 0.2s;-webkit-tap-highlight-color:transparent;
}
#inputBar .send-btn:active{transform:scale(0.9);}
#inputBar .send-btn svg{width:16px;height:16px;}
/* ── DOC ACTIONS (inline in chat) ── */
.doc-actions{
  display:flex;gap:8px;margin-top:10px;padding-left:38px;
}
.doc-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);
  color:#22C55E;font-family:var(--font-ui);font-size:12px;font-weight:600;
  padding:8px 14px;border-radius:50px;cursor:pointer;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
}
.doc-btn:hover{background:rgba(34,197,94,0.18);border-color:#22C55E;}
.doc-btn:active{transform:scale(0.96);}
.doc-btn svg{width:14px;height:14px;flex-shrink:0;}
/* ── DOCUMENTS DRAWER ── */
#docsOverlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
#docsOverlay.open{opacity:1;pointer-events:auto;}
#docsDrawer{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;max-height:80vh;
  background:var(--bg);border:1px solid var(--border);
  border-radius:20px 20px 0 0;z-index:201;
  display:flex;flex-direction:column;
  transform:translateX(-50%) translateY(100%);
  transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
}
#docsOverlay.open + #docsDrawer,
#docsDrawer.open{transform:translateX(-50%) translateY(0);}
.drawer-handle{
  width:36px;height:4px;border-radius:2px;background:rgba(245,241,234,0.2);
  margin:10px auto 0;flex-shrink:0;
}
.drawer-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;flex-shrink:0;
}
.drawer-header h2{
  font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;
  color:var(--cream);letter-spacing:1px;
}
.drawer-close{
  background:none;border:none;color:var(--cream-40);font-size:20px;
  cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent;
}
.drawer-list{
  flex:1;overflow-y:auto;padding:0 16px 24px;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 24px);
}
.drawer-list::-webkit-scrollbar{width:0;display:none;}
.doc-item{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-bottom:10px;cursor:pointer;
  transition:border-color 0.2s;-webkit-tap-highlight-color:transparent;
}
.doc-item:hover{border-color:var(--gold);}
.doc-icon{
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:16px;
}
.doc-icon.pnl,.doc-icon.expense-report{background:rgba(34,197,94,0.12);color:#22C55E;}
.doc-icon.tax-summary{background:rgba(196,149,58,0.12);color:var(--gold);}
.doc-icon.email{background:rgba(236,72,153,0.12);color:#EC4899;}
.doc-icon.plan,.doc-icon.contract{background:rgba(59,130,246,0.12);color:#3B82F6;}
.doc-info{flex:1;min-width:0;}
.doc-info .doc-title{
  font-family:var(--font-ui);font-size:14px;font-weight:600;color:var(--cream);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.doc-info .doc-meta{font-size:11px;color:var(--cream-40);margin-top:2px;}
.doc-item-actions{display:flex;gap:6px;}
.doc-item-btn{
  background:rgba(245,241,234,0.06);border:1px solid rgba(245,241,234,0.1);
  border-radius:8px;padding:6px 8px;cursor:pointer;color:var(--cream-60);
  transition:all 0.15s;-webkit-tap-highlight-color:transparent;
}
.doc-item-btn:hover{background:rgba(245,241,234,0.1);color:var(--cream);}
.doc-item-btn svg{width:14px;height:14px;display:block;}
.drawer-empty{
  text-align:center;padding:40px 20px;color:var(--cream-40);font-size:14px;
}
/* ── DOCS BUTTON (top bar) ── */
.docs-badge{
  position:relative;background:none;border:none;cursor:pointer;
  color:var(--cream-40);padding:0;display:flex;align-items:center;
  -webkit-tap-highlight-color:transparent;transition:color 0.2s;
}
.docs-badge:hover{color:var(--cream);}
.docs-badge svg{width:18px;height:18px;}
.docs-badge .badge-count{
  position:absolute;top:-4px;right:-6px;
  min-width:14px;height:14px;border-radius:7px;
  background:#22C55E;color:#fff;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  padding:0 3px;display:none;
}
.docs-badge .badge-count.has-docs{display:flex;}
/* ── TOAST ── */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:#1a1a2e;border:1px solid var(--border);border-radius:12px;
  padding:10px 18px;font-size:13px;color:var(--cream);font-family:var(--font-ui);
  z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.toast.show{opacity:1;}
@media(min-width:431px){body{background:var(--bg);}}
</style>
</head>
<body>
<div id="app">
  <div id="topBar">
    <div class="logo"><img src="logo.png" alt="Fanded"><span>fanded</span></div>
    <div class="title">MAWD</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="agent-dots">
        <div class="agent-dot" data-agent="dollar"></div>
        <div class="agent-dot" data-agent="pulse"></div>
        <div class="agent-dot" data-agent="scout"></div>
        <div class="agent-dot" data-agent="compass"></div>
        <div class="agent-dot" data-agent="hype"></div>
        <div class="agent-dot" data-agent="ledger"></div>
      </div>
      <button class="docs-badge" id="docsBtn" aria-label="Documents">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span class="badge-count" id="docsBadge">0</span>
      </button>
    </div>
  </div>
  <div id="gradLine"></div>
  <div id="statusPill">
    <div class="pill"><span class="dot"></span> MAWD is active</div>
  </div>
  <div id="chatArea"></div>
  <!-- Documents Drawer -->
  <div id="docsOverlay"></div>
  <div id="docsDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <h2>Documents</h2>
      <button class="drawer-close" id="drawerClose">&times;</button>
    </div>
    <div class="drawer-list" id="docsList">
      <div class="drawer-empty" id="docsEmpty">No documents yet. Ask MAWD to generate a P&L, expense report, or tax summary.</div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <div id="inputBar">
    <button class="mic-btn" aria-label="Voice input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <input type="text" id="userInput" placeholder="Reply to MAWD..." autocomplete="off">
    <button class="send-btn" id="sendBtn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--cream)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2" fill="var(--cream)" stroke="var(--cream)"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function(){
  var AGENTS = {
    dollar:{color:'#C4953A',label:'DOLLAR',thinking:'DOLLAR is calculating...'},
    pulse:{color:'#7C3AED',label:'PULSE',thinking:'PULSE is reading your fans...'},
    scout:{color:'#0D9488',label:'SCOUT',thinking:'SCOUT is searching...'},
    compass:{color:'#3B82F6',label:'COMPASS',thinking:'COMPASS is thinking...'},
    hype:{color:'#EC4899',label:'HYPE',thinking:'HYPE is writing...'},
    ledger:{color:'#22C55E',label:'LEDGER',thinking:'LEDGER is organizing...'}
  };

  var chatArea = document.getElementById('chatArea');
  var userInput = document.getElementById('userInput');
  var sendBtn = document.getElementById('sendBtn');
  var docsBtn = document.getElementById('docsBtn');
  var docsBadge = document.getElementById('docsBadge');
  var docsOverlay = document.getElementById('docsOverlay');
  var docsDrawer = document.getElementById('docsDrawer');
  var drawerClose = document.getElementById('drawerClose');
  var docsList = document.getElementById('docsList');
  var docsEmpty = document.getElementById('docsEmpty');
  var toastEl = document.getElementById('toast');
  var isTyping = false;
  var conversationHistory = [];
  var currentAgent = 'compass';
  var activeTip = null;
  var savedDocs = JSON.parse(localStorage.getItem('mawd_docs') || '[]');

  // ── Documents system ──
  var DOC_ICONS = {
    'pnl':'📊','expense-report':'🧾','tax-summary':'💰',
    'email':'✉️','plan':'📋','contract':'📄'
  };

  function saveDoc(type, title, content){
    var doc = {
      id: Date.now(),
      type: type,
      title: title,
      content: content,
      date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
    };
    savedDocs.unshift(doc);
    localStorage.setItem('mawd_docs', JSON.stringify(savedDocs));
    updateDocsBadge();
    return doc;
  }

  function updateDocsBadge(){
    var count = savedDocs.length;
    docsBadge.textContent = count;
    if(count > 0) docsBadge.classList.add('has-docs');
    else docsBadge.classList.remove('has-docs');
  }

  function openDrawer(){
    renderDocsList();
    docsOverlay.classList.add('open');
    docsDrawer.classList.add('open');
  }

  function closeDrawer(){
    docsOverlay.classList.remove('open');
    docsDrawer.classList.remove('open');
  }

  docsBtn.addEventListener('click', openDrawer);
  docsOverlay.addEventListener('click', closeDrawer);
  drawerClose.addEventListener('click', closeDrawer);

  function renderDocsList(){
    docsList.innerHTML = '';
    if(savedDocs.length === 0){
      docsList.innerHTML = '<div class="drawer-empty">No documents yet. Ask MAWD to generate a P&L, expense report, or tax summary.</div>';
      return;
    }
    savedDocs.forEach(function(doc){
      var item = document.createElement('div');
      item.className = 'doc-item';
      var icon = document.createElement('div');
      icon.className = 'doc-icon ' + doc.type;
      icon.textContent = DOC_ICONS[doc.type] || '📄';
      var info = document.createElement('div');
      info.className = 'doc-info';
      info.innerHTML = '<div class="doc-title">' + doc.title + '</div><div class="doc-meta">' + doc.date + '</div>';
      var actions = document.createElement('div');
      actions.className = 'doc-item-actions';
      // Download button
      var dlBtn = document.createElement('button');
      dlBtn.className = 'doc-item-btn';
      dlBtn.title = 'Download';
      dlBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
      dlBtn.addEventListener('click',function(e){e.stopPropagation();downloadDoc(doc);});
      // Share/forward button
      var shareBtn = document.createElement('button');
      shareBtn.className = 'doc-item-btn';
      shareBtn.title = 'Share';
      shareBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>';
      shareBtn.addEventListener('click',function(e){e.stopPropagation();shareDoc(doc);});
      // Delete button
      var delBtn = document.createElement('button');
      delBtn.className = 'doc-item-btn';
      delBtn.title = 'Delete';
      delBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>';
      delBtn.addEventListener('click',function(e){
        e.stopPropagation();
        savedDocs = savedDocs.filter(function(d){return d.id !== doc.id;});
        localStorage.setItem('mawd_docs', JSON.stringify(savedDocs));
        updateDocsBadge();
        renderDocsList();
        showToast('Document deleted');
      });
      actions.appendChild(dlBtn);
      actions.appendChild(shareBtn);
      actions.appendChild(delBtn);
      item.appendChild(icon);
      item.appendChild(info);
      item.appendChild(actions);
      item.addEventListener('click',function(){downloadDoc(doc);});
      docsList.appendChild(item);
    });
  }

  function downloadDoc(doc){
    // Generate a clean text file
    var text = doc.title + '\n' + '='.repeat(doc.title.length) + '\n\n' + doc.content;
    var blob = new Blob([text], {type:'text/plain'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = doc.title.replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'-').toLowerCase() + '.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Downloaded: ' + doc.title);
  }

  function shareDoc(doc){
    var text = doc.title + '\n\n' + doc.content;
    if(navigator.share){
      navigator.share({title:doc.title, text:text}).catch(function(){});
    } else if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(function(){
        showToast('Copied to clipboard — paste into email or message');
      });
    } else {
      // Fallback: open mailto
      var subject = encodeURIComponent(doc.title);
      var body = encodeURIComponent(doc.content);
      window.open('mailto:?subject='+subject+'&body='+body);
    }
  }

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(function(){toastEl.classList.remove('show');},2500);
  }

  // Detect document markers in MAWD response and extract/save
  function processDocMarkers(text){
    var match = text.match(/<!--DOC:([^:]+):([^>]+)-->/);
    if(!match) return {cleanText:text, doc:null};
    var type = match[1].trim();
    var title = match[2].trim();
    var cleanText = text.replace(/<!--DOC:[^>]+-->/g,'').trim();
    var doc = saveDoc(type, title, cleanText);
    return {cleanText:cleanText, doc:doc};
  }

  // Add download/share buttons after a document message
  function addDocActions(contentDiv, doc){
    var actionsDiv = document.createElement('div');
    actionsDiv.className = 'doc-actions';
    var dlBtn = document.createElement('button');
    dlBtn.className = 'doc-btn';
    dlBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download';
    dlBtn.addEventListener('click',function(){downloadDoc(doc);});
    var shareBtn = document.createElement('button');
    shareBtn.className = 'doc-btn';
    shareBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Send to accountant';
    shareBtn.addEventListener('click',function(){shareDoc(doc);});
    actionsDiv.appendChild(dlBtn);
    actionsDiv.appendChild(shareBtn);
    contentDiv.appendChild(actionsDiv);
  }

  updateDocsBadge();

  // ── Glossary ──
  var GLOSSARY = {
    'MRR':{def:'Monthly Recurring Revenue \u2014 the predictable income you earn every month from subscriptions like Patreon or your fan club.',link:'https://www.investopedia.com/terms/m/mrr.asp'},
    'churn':{def:'The rate at which subscribers cancel. If 5 out of 100 leave this month, that\'s 5% churn. Lower is better.',link:null},
    'churn rate':{def:'The percentage of subscribers who cancel in a given period. If 5 out of 100 leave this month, that\'s 5% churn. Lower is better.',link:null},
    'churn forecast':{def:'A prediction of how many subscribers are likely to cancel soon, based on their recent engagement patterns. Lets you save them before they leave.',link:null},
    'churn risk':{def:'How likely a subscriber is to cancel. High churn risk means they\'ve stopped engaging and might leave soon.',link:null},
    'patrons':{def:'People who pay a monthly subscription to support you directly, usually through Patreon or a fan club.',link:null},
    'win-back':{def:'A strategy to bring back fans who canceled their subscription. Usually a personal message or special offer.',link:null},
    'engagement':{def:'How actively fans interact with your content \u2014 likes, comments, shares, watch time, opens. High engagement = real fans, not just followers.',link:null},
    'recurring revenue':{def:'Money that comes in automatically every month without you doing anything new. The holy grail of creator income.',link:null},
    'recurring':{def:'Money that comes in automatically every month without you doing anything new. The holy grail of creator income.',link:null},
    'audience overlap':{def:'When a brand\'s customers and your fans are the same type of people. Higher overlap = better partnership fit and more money.',link:null},
    'fan profile':{def:'A picture of who your fans are \u2014 age, location, interests, spending habits. Built from your actual data, not guesses.',link:null},
    'sync':{def:'Licensing your music for use in a TV show, film, ad, or video game. Can pay anywhere from $1,500 to $500,000+.',link:null},
    'sync opportunity':{def:'A chance to license your music for use in a TV show, film, ad, or video game. Can be a major payday.',link:'https://www.ascap.com/help/music-business-101/sync-licensing'},
    'catalog':{def:'Your entire library of released music \u2014 every song, album, and feature you\'ve ever put out. It\'s an asset that earns money forever.',link:null},
    'CPM':{def:'Cost Per Mille \u2014 how much a brand pays per 1,000 views or impressions on your content. Higher CPM = more money per post.',link:'https://www.investopedia.com/terms/c/cpm.asp'},
    'brand deal':{def:'When a company pays you to promote their product to your audience. Can be a social post, video mention, or full campaign.',link:null},
    'conversion rate':{def:'The percentage of people who take an action you want \u2014 like going from follower to email subscriber, or from free to paid member.',link:null},
    'first-party data':{def:'Information you collect directly from your fans (emails, purchases, preferences) \u2014 as opposed to data platforms collect about your fans and keep from you.',link:null},
    'owned database':{def:'A list of your fans\' contact info (emails, phones) that YOU control. Unlike followers on Instagram or Spotify, no algorithm can take this away.',link:null},
    'fan density':{def:'How concentrated your fans are in a specific city or region. High density = enough fans to sell out a venue there.',link:null},
    'recoupment':{def:'When a label or distributor gave you an advance (upfront money), they keep your earnings until that advance is paid back. You don\'t see streaming money until it recoups.',link:null},
    'advance':{def:'Upfront money from a label or distributor. Sounds great, but they keep your future earnings until it\'s paid back (recouped).',link:null},
    'retention':{def:'How well you keep subscribers over time. 95% retention means only 5% leave each month. The higher the better.',link:null},
    'LTV':{def:'Lifetime Value \u2014 the total amount of money a fan will spend on you over their entire relationship with you. A fan who pays $10/mo for 3 years has an LTV of $360.',link:null},
    'top of funnel':{def:'The first point of contact with a potential fan. A TikTok video or Spotify play is top of funnel \u2014 it introduces you. The goal is to move them deeper (email, club, purchase).',link:null},
    'funnel':{def:'The journey a person takes from discovering you to becoming a paying fan. Top = discovery (Spotify, TikTok). Middle = connection (email, follow). Bottom = revenue (club, merch, tickets).',link:null},
    'income streams':{def:'The different ways you make money \u2014 streaming, fan clubs, merch, brand deals, sync, touring, production. More streams = more stable income.',link:null},
    'revenue streams':{def:'The different ways you make money \u2014 streaming, fan clubs, merch, brand deals, sync, touring, production. More streams = more stable income.',link:null}
  };

  // ── Jargon detection + tooltips ──
  function applyGlossary(bubble){
    var html = bubble.innerHTML;
    var terms = Object.keys(GLOSSARY).sort(function(a,b){return b.length-a.length;});
    terms.forEach(function(term){
      var escaped = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      var regex = new RegExp('(?<![<\\w])(' + escaped + ')(?![\\w>])','gi');
      html = html.replace(regex, function(match){
        return '<span class="jargon" data-term="'+term+'">'+match+'</span>';
      });
    });
    bubble.innerHTML = html;
    bubble.querySelectorAll('.jargon').forEach(function(el){
      el.addEventListener('click',function(e){
        e.stopPropagation();
        showTip(el, el.getAttribute('data-term'));
      });
    });
  }

  function showTip(el, termKey){
    closeTip();
    var entry = GLOSSARY[termKey];
    if(!entry) return;
    var tip = document.createElement('div');
    tip.className='jargon-tip';
    var close = document.createElement('button');
    close.className='tip-close';
    close.innerHTML='&times;';
    close.addEventListener('click',function(e){e.stopPropagation();closeTip();});
    tip.appendChild(close);
    var title = document.createElement('div');
    title.className='tip-term';
    title.textContent=termKey;
    tip.appendChild(title);
    var def = document.createElement('div');
    def.className='tip-def';
    def.textContent=entry.def;
    tip.appendChild(def);
    if(entry.link){
      var a = document.createElement('a');
      a.className='tip-link';a.href=entry.link;a.target='_blank';a.rel='noopener';
      a.textContent='Learn more \u2192';
      tip.appendChild(a);
    }
    document.body.appendChild(tip);
    activeTip = tip;
    var rect = el.getBoundingClientRect();
    var tipW = Math.min(280, window.innerWidth - 32);
    var left = rect.left + rect.width/2 - tipW/2;
    if(left < 16) left = 16;
    if(left + tipW > window.innerWidth - 16) left = window.innerWidth - 16 - tipW;
    var top = rect.bottom + 8;
    if(top + 120 > window.innerHeight){
      top = rect.top - 8;
      tip.style.transform='translateY(-100%)';
    }
    tip.style.left = left+'px';
    tip.style.top = top+'px';
    tip.style.width = tipW+'px';
    requestAnimationFrame(function(){tip.classList.add('visible');});
  }

  function closeTip(){if(activeTip){activeTip.remove();activeTip=null;}}
  document.addEventListener('click',closeTip);

  // ── Helpers ──
  function scrollBottom(){
    requestAnimationFrame(function(){
      chatArea.scrollTo({top:chatArea.scrollHeight,behavior:'smooth'});
    });
  }

  function setActiveAgent(agent){
    document.querySelectorAll('.agent-dot').forEach(function(d){
      d.classList.remove('active');d.style.color='';
    });
    if(agent && AGENTS[agent]){
      var dot = document.querySelector('.agent-dot[data-agent="'+agent+'"]');
      if(dot){dot.classList.add('active');dot.style.color=AGENTS[agent].color;}
    }
    currentAgent = agent || currentAgent;
  }

  function addTimestamp(text){
    var div = document.createElement('div');
    div.className='timestamp';div.textContent=text;
    chatArea.appendChild(div);scrollBottom();
  }

  function addTalentMessage(text){
    var wrap = document.createElement('div');
    wrap.className='msg-wrap msg-talent';
    var bubble = document.createElement('div');
    bubble.className='talent-bubble';bubble.textContent=text;
    wrap.appendChild(bubble);chatArea.appendChild(wrap);scrollBottom();
  }

  function showThinking(agent){
    setActiveAgent(agent);
    var a = AGENTS[agent] || AGENTS.compass;
    var wrap = document.createElement('div');
    wrap.className='thinking-wrap';wrap.id='thinkingIndicator';
    var avatar = document.createElement('div');
    avatar.className='mawd-avatar';avatar.textContent='M';
    wrap.appendChild(avatar);
    var content = document.createElement('div');
    content.className='thinking-content';
    var dots = document.createElement('div');
    dots.className='thinking-dots';
    for(var i=0;i<3;i++){
      var s=document.createElement('span');s.style.background=a.color;dots.appendChild(s);
    }
    content.appendChild(dots);
    var label = document.createElement('div');
    label.className='thinking-label';label.textContent=a.thinking;
    content.appendChild(label);
    wrap.appendChild(content);
    chatArea.appendChild(wrap);scrollBottom();
  }

  function hideThinking(){
    var el = document.getElementById('thinkingIndicator');
    if(el) el.remove();
  }

  function typeMessage(agent, text, quickReplies, callback){
    isTyping = true;
    var a = AGENTS[agent] || AGENTS.compass;
    setActiveAgent(agent);

    // Check for document markers before displaying
    var result = processDocMarkers(text);
    var displayText = result.cleanText;
    var generatedDoc = result.doc;

    var wrap = document.createElement('div');
    wrap.className='msg-wrap msg-mawd';
    var avatar = document.createElement('div');
    avatar.className='mawd-avatar';avatar.textContent='M';
    var contentDiv = document.createElement('div');
    contentDiv.className='mawd-content';
    var lbl = document.createElement('div');
    lbl.className='agent-label';lbl.style.color=a.color;lbl.textContent=a.label;
    var bubble = document.createElement('div');
    bubble.className='mawd-bubble';
    bubble.style.borderLeftColor=a.color;
    bubble.style.borderLeftWidth='3px';
    bubble.style.borderLeftStyle='solid';
    var cursor = document.createElement('span');
    cursor.className='typing-cursor';
    contentDiv.appendChild(lbl);
    contentDiv.appendChild(bubble);
    wrap.appendChild(avatar);
    wrap.appendChild(contentDiv);
    chatArea.appendChild(wrap);
    scrollBottom();

    // For long documents, skip character-by-character and render instantly
    var isLongDoc = displayText.length > 600;

    if(isLongDoc){
      bubble.innerHTML = '';
      // Render the text with line breaks
      var lines = displayText.split('\n');
      lines.forEach(function(line, i){
        if(i > 0) bubble.appendChild(document.createElement('br'));
        if(line.trim()) bubble.appendChild(document.createTextNode(line));
      });
      applyGlossary(bubble);
      isTyping = false;
      scrollBottom();

      if(generatedDoc){
        addDocActions(contentDiv, generatedDoc);
        showToast('Document saved — tap 📄 to access anytime');
        scrollBottom();
      }

      if(quickReplies && quickReplies.length){
        var qrDiv = document.createElement('div');
        qrDiv.className='quick-replies';
        quickReplies.forEach(function(r){
          var btn = document.createElement('button');
          btn.className='qr-btn';btn.textContent=r;
          btn.addEventListener('click',function(){
            qrDiv.querySelectorAll('.qr-btn').forEach(function(b){
              b.style.pointerEvents='none';b.style.opacity='0.4';
            });
            btn.style.opacity='1';btn.classList.add('selected');
            sendMessage(r);
          });
          qrDiv.appendChild(btn);
        });
        contentDiv.appendChild(qrDiv);
        scrollBottom();
      }

      if(callback) callback();
      return;
    }

    var chars = displayText.split('');
    var idx = 0;
    bubble.innerHTML='';
    bubble.appendChild(cursor);

    function typeNext(){
      if(idx < chars.length){
        var ch = chars[idx];
        if(ch==='\n'){
          bubble.insertBefore(document.createElement('br'),cursor);
        } else {
          bubble.insertBefore(document.createTextNode(ch),cursor);
        }
        idx++;
        if(idx%3===0) scrollBottom();
        var speed = 15;
        if(ch==='.') speed=100;
        else if(ch===',') speed=50;
        else if(ch==='\n') speed=60;
        else if(ch==='\u2014') speed=60;
        setTimeout(typeNext,speed);
      } else {
        bubble.removeChild(cursor);
        applyGlossary(bubble);
        isTyping = false;
        scrollBottom();

        if(generatedDoc){
          addDocActions(contentDiv, generatedDoc);
          showToast('Document saved — tap 📄 to access anytime');
          scrollBottom();
        }

        if(quickReplies && quickReplies.length){
          var qrDiv = document.createElement('div');
          qrDiv.className='quick-replies';
          quickReplies.forEach(function(r){
            var btn = document.createElement('button');
            btn.className='qr-btn';btn.textContent=r;
            btn.addEventListener('click',function(){
              qrDiv.querySelectorAll('.qr-btn').forEach(function(b){
                b.style.pointerEvents='none';b.style.opacity='0.4';
              });
              btn.style.opacity='1';btn.classList.add('selected');
              sendMessage(r);
            });
            qrDiv.appendChild(btn);
          });
          contentDiv.appendChild(qrDiv);
          scrollBottom();
        }

        if(callback) callback();
      }
    }
    typeNext();
  }

  // ── Suggest quick replies based on response ──
  function generateQuickReplies(text){
    // If the message ends with a question, generate contextual replies
    var replies = [];
    var lower = text.toLowerCase();

    if(lower.indexOf('what do you do') > -1 || lower.indexOf('what kind of') > -1 || lower.indexOf('what type') > -1){
      replies = ["I'm a musician","I'm an actor","I'm a creator","I manage talent"];
    } else if(lower.indexOf('want me to show') > -1 || lower.indexOf('want to see') > -1){
      replies = ['Show me','Tell me more','What else can you do?'];
    } else if(lower.indexOf('should i') > -1 || lower.indexOf('shall i') > -1){
      replies = ['Yes, do it','Tell me more first','What else?'];
    } else if(lower.indexOf('connect') > -1 && lower.indexOf('?') > -1){
      replies = ['What happens when I connect?','Show me an example','What data do you need?'];
    } else if(lower.indexOf('which') > -1 && lower.indexOf('first') > -1){
      replies = ['The money stuff','My fans','The biggest opportunity'];
    } else if(lower.indexOf('want') > -1 && lower.indexOf('?') > -1){
      replies = ['Yes','Tell me more','What else can you do?'];
    } else if(lower.indexOf('?') > -1){
      replies = ['Yes','Tell me more','What else?'];
    }

    return replies;
  }

  // ── API call ──
  function callMAWD(messages, agent, callback){
    fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:messages, agent:agent, mode: window.location.search.includes('demo') ? 'demo' : 'personal'})
    })
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.error){
        callback('I\'m having trouble connecting right now. Try again in a moment.', agent);
      } else {
        callback(data.reply, data.agent || agent);
      }
    })
    .catch(function(){
      callback('I\'m having trouble connecting. Let\'s try again in a moment.', agent);
    });
  }

  // ── Send message ──
  function sendMessage(text){
    if(!text){
      text = userInput.value.trim();
    }
    if(!text || isTyping) return;
    userInput.value = '';

    addTalentMessage(text);
    conversationHistory.push({role:'user', content:text});

    // Pick agent based on content keywords
    var agent = pickAgent(text);
    showThinking(agent);

    callMAWD(conversationHistory, agent, function(reply, detectedAgent){
      hideThinking();
      conversationHistory.push({role:'assistant', content:reply});
      var qr = generateQuickReplies(reply);
      typeMessage(detectedAgent || agent, reply, qr, null);
    });
  }

  function pickAgent(text){
    var t = text.toLowerCase();
    if(/money|revenue|income|earn|pay|financ|churn|mrr|subscri|pricing/.test(t)) return 'dollar';
    if(/fan|audience|listen|follower|engage|data|database/.test(t)) return 'pulse';
    if(/brand|deal|partner|sponsor|opportun|inbox|collab/.test(t)) return 'scout';
    if(/content|write|draft|post|voice|copy|social|messag|design|album|website/.test(t)) return 'hype';
    if(/tax|expense|deduct|receipt|accountant|cpa|s.corp|llc|bookkeep|invoice|p&l|p\+l|profit.?loss|report|statement|generat/.test(t)) return 'ledger';
    return 'compass';
  }

  // ── Event listeners ──
  sendBtn.addEventListener('click', function(){sendMessage();});
  userInput.addEventListener('keydown', function(e){
    if(e.key==='Enter' && !e.shiftKey){e.preventDefault();sendMessage();}
  });

  // ── Opening sequence ──
  function startMAWD(){
    var now = new Date();
    var hours = now.getHours();
    var mins = now.getMinutes().toString().padStart(2,'0');
    var ampm = hours >= 12 ? 'PM' : 'AM';
    var h = hours % 12 || 12;
    addTimestamp('Today, ' + h + ':' + mins + ' ' + ampm);

    showThinking('compass');

    // First message — MAWD introduces herself via API
    callMAWD(
      [{role:'user', content:'Morning. What\'s up today?'}],
      'compass',
      function(reply, detectedAgent){
        hideThinking();
        // Don't add the hidden prompt to visible history
        conversationHistory.push({role:'assistant', content:reply});
        var qr = generateQuickReplies(reply);
        typeMessage(detectedAgent || 'compass', reply, qr, null);
      }
    );
  }

  setTimeout(startMAWD, 600);

})();
</script>
