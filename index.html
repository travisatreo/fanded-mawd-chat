<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MAWD (by Fanded)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#09090B;
  --surface:#111113;
  --surface-2:#18181B;
  --surface-3:#1F1F23;
  --border:#27272A;
  --border-hover:#3F3F46;
  --text:#FAFAFA;
  --text-2:#A1A1AA;
  --text-3:#71717A;
  --text-4:#52525B;
  --gold:#C4953A;
  --gold-dim:rgba(196,149,58,0.14);
  --gold-glow:rgba(196,149,58,0.08);
  --c-1:#8B5CF6;
  --c-2:#3B82F6;
  --c-3:#EC4899;
  --c-4:#22C55E;
  --c-5:#F97316;
  --c-6:#EAB308;
  --font:'DM Sans',system-ui,-apple-system,sans-serif;
  --font-mono:'Space Grotesk','DM Sans',monospace;
  --radius:12px;
  --radius-sm:8px;
  --sidebar-w:240px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea{font-family:inherit;color:inherit;background:none;border:none;outline:none;}

#app{display:flex;height:100%;position:relative;}

#sidebar{
  width:var(--sidebar-w);height:100%;
  background:var(--bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:14px 0 0;
  flex-shrink:0;z-index:40;
  transition:transform 0.22s cubic-bezier(0.4,0,0.2,1);
}
.sidebar-top{padding:0 14px 10px;}
.from-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 9px;border-radius:999px;
  background:var(--surface-2);border:1px solid var(--border);
  font-size:10.5px;color:var(--text-3);letter-spacing:0.03em;
  margin-bottom:12px;
}
.from-pill-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);}
.brand-row{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--surface-2),var(--surface-3));
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;color:var(--gold);
  letter-spacing:-0.02em;
}
.brand-name{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.01em;}
.brand-by{font-size:10.5px;color:var(--text-3);letter-spacing:0.06em;text-transform:uppercase;}

.sidebar-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 10px;border-radius:8px;
  font-size:13.5px;color:var(--text-2);
  cursor:pointer;position:relative;
  transition:background 0.12s,color 0.12s;
}
.nav-item:hover{background:var(--surface);color:var(--text);}
.nav-item.active{background:var(--surface-2);color:var(--text);}
.nav-item.active::before{
  content:"";position:absolute;left:-10px;top:8px;bottom:8px;width:3px;
  background:var(--accent);border-radius:2px;
}
.nav-icon{
  width:18px;height:18px;flex-shrink:0;
  color:var(--accent);opacity:0.9;
  display:flex;align-items:center;justify-content:center;
}
.nav-icon svg{width:100%;height:100%;}
.nav-label{flex:1;}
.nav-badge{
  min-width:18px;height:18px;padding:0 5px;
  border-radius:9px;background:var(--accent);
  color:#fff;font-size:10.5px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);
}
.nav-coming{
  font-size:9.5px;color:var(--text-4);
  text-transform:uppercase;letter-spacing:0.05em;
}

.sidebar-bottom{padding:10px 10px max(14px,env(safe-area-inset-bottom));border-top:1px solid var(--border);}
.settings-btn{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:8px;width:100%;
  font-size:13px;color:var(--text-3);
}
.settings-btn:hover{background:var(--surface);color:var(--text-2);}
.settings-btn svg{width:16px;height:16px;}

#main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;}
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;
  position:relative;
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.menu-btn{
  display:none;width:32px;height:32px;border-radius:8px;
  align-items:center;justify-content:center;color:var(--text-2);
}
.menu-btn:hover{background:var(--surface);color:var(--text);}
.view-title{font-size:13px;color:var(--text-3);letter-spacing:0.04em;text-transform:uppercase;}
.listening{
  display:flex;align-items:center;gap:7px;
  font-size:11px;color:var(--text-2);
  font-family:var(--font-mono);letter-spacing:0.04em;
}
.listening-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold);
  animation:listenPulse 2.2s ease-in-out infinite;
  box-shadow:0 0 10px var(--gold);
}
@keyframes listenPulse{
  0%,100%{opacity:0.55;transform:scale(1);}
  50%{opacity:1;transform:scale(1.25);}
}
#gradLine{
  height:2px;
  background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--c-1) 60%,transparent);
  opacity:0.55;
}

#canvas{flex:1;overflow-y:auto;padding:18px 20px 150px;}
.canvas-header{margin-bottom:16px;}
.canvas-eyebrow{font-size:10.5px;color:var(--text-3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.canvas-title{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-0.015em;line-height:1.2;margin-bottom:6px;}
.canvas-sub{font-size:13.5px;color:var(--text-2);line-height:1.5;}

.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.metric-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  position:relative;overflow:hidden;
  transition:border-color 0.15s;
}
.metric-card:hover{border-color:var(--border-hover);}
.metric-value{font-size:22px;font-weight:700;color:var(--text);font-family:var(--font-mono);letter-spacing:-0.02em;margin-bottom:2px;}
.metric-label{font-size:10px;color:var(--text-3);letter-spacing:0.08em;text-transform:uppercase;line-height:1.35;}
.metric-card.accent-1 .metric-value{color:var(--c-1);}
.metric-card.accent-2 .metric-value{color:var(--c-2);}
.metric-card.accent-3 .metric-value{color:var(--c-3);}
.metric-card.accent-4 .metric-value{color:var(--c-4);}

.section-label{
  font-size:10.5px;color:var(--text-3);
  letter-spacing:0.1em;text-transform:uppercase;
  margin:20px 0 10px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:"";flex:1;height:1px;background:var(--border);}

.insight-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;
  transition:border-color 0.15s;
  cursor:pointer;
}
.insight-card:hover{border-color:var(--border-hover);}
.insight-tag{
  display:inline-block;padding:2px 8px;border-radius:999px;
  font-size:10px;font-weight:600;letter-spacing:0.04em;
  margin-bottom:6px;font-family:var(--font-mono);
}
.insight-tag.t-metric{background:rgba(139,92,246,0.12);color:var(--c-1);}
.insight-tag.t-pulse{background:rgba(34,197,94,0.12);color:var(--c-4);}
.insight-tag.t-warn{background:rgba(249,115,22,0.14);color:var(--c-5);}
.insight-tag.t-action{background:var(--gold-dim);color:var(--gold);}
.insight-tag.t-you{background:var(--surface-2);color:var(--text-2);}
.insight-headline{font-size:14.5px;font-weight:500;color:var(--text);line-height:1.45;}
.insight-headline strong{color:var(--text);font-weight:600;}
.insight-sub{font-size:12.5px;color:var(--text-3);margin-top:4px;line-height:1.45;}

.draft-card{
  background:linear-gradient(180deg,var(--surface),var(--surface-2));
  border:1px solid var(--gold-dim);
  border-radius:var(--radius);
  padding:14px 16px;margin:10px 0;
  position:relative;
}
.draft-card::before{
  content:"";position:absolute;left:0;top:12px;bottom:12px;width:2px;
  background:var(--gold);border-radius:0 2px 2px 0;
}
.draft-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
.draft-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 9px;border-radius:999px;
  background:var(--gold-dim);color:var(--gold);
  font-size:10.5px;font-weight:600;letter-spacing:0.05em;
  font-family:var(--font-mono);text-transform:uppercase;
}
.draft-context{font-size:11px;color:var(--text-3);}
.draft-to{font-size:12px;color:var(--text-2);margin-bottom:4px;}
.draft-to strong{color:var(--text);}
.draft-subject{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:8px;}
.draft-body{
  font-size:13px;color:var(--text-2);line-height:1.55;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 12px;
  white-space:pre-wrap;max-height:220px;overflow-y:auto;
  margin-bottom:10px;
  font-family:var(--font);
  width:100%;
  resize:vertical;
}
.draft-actions{display:flex;gap:6px;flex-wrap:wrap;}
.draft-btn{
  padding:7px 12px;border-radius:8px;
  font-size:12px;font-weight:600;
  border:1px solid var(--border);color:var(--text-2);
  background:var(--bg);
  transition:background 0.12s,border-color 0.12s,color 0.12s;
}
.draft-btn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-hover);}
.draft-btn.primary{background:var(--gold);color:#0A0A0A;border-color:var(--gold);}
.draft-btn.primary:hover{background:#D4A843;}
.draft-btn.ghost{color:var(--text-3);}

.coming-preview{
  border:1px dashed var(--border);
  border-radius:var(--radius);
  padding:18px 16px;margin-bottom:12px;
  background:rgba(255,255,255,0.008);
}
.coming-preview .coming-title{
  font-size:13px;font-weight:600;color:var(--text-2);
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.coming-preview .coming-soon-pill{
  font-size:9.5px;padding:2px 7px;border-radius:999px;
  background:var(--surface-2);color:var(--text-3);
  letter-spacing:0.06em;text-transform:uppercase;font-family:var(--font-mono);
}
.coming-preview .coming-body{font-size:12.5px;color:var(--text-3);line-height:1.55;}
.coming-preview ul{list-style:none;margin-top:10px;}
.coming-preview li{font-size:12.5px;color:var(--text-2);padding:4px 0 4px 12px;position:relative;line-height:1.5;}
.coming-preview li::before{content:"";position:absolute;left:0;top:11px;width:4px;height:4px;border-radius:50%;background:var(--accent,var(--text-4));}

#chatbar{
  position:fixed;bottom:0;left:var(--sidebar-w);right:0;
  padding:14px 20px max(14px,env(safe-area-inset-bottom));
  background:linear-gradient(180deg,transparent,var(--bg) 28%);
  z-index:30;
}
.chatbar-inner{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;padding:4px 4px 4px 16px;
  transition:border-color 0.15s;
}
.chatbar-inner:focus-within{border-color:var(--border-hover);}
#chatInput{
  flex:1;font-size:14px;padding:10px 0;color:var(--text);
  background:transparent;
}
#chatInput::placeholder{color:var(--text-4);}
.send-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--gold);color:#0A0A0A;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background 0.12s,transform 0.12s;
}
.send-btn:hover{background:#D4A843;}
.send-btn:active{transform:scale(0.96);}
.send-btn svg{width:16px;height:16px;}
.chatbar-foot{
  text-align:center;font-size:10.5px;color:var(--text-4);
  letter-spacing:0.02em;margin-top:8px;
}

#sidebarOverlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:35;backdrop-filter:blur(2px);
}
#sidebarOverlay.open{display:block;}

.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--surface-2);border:1px solid var(--border);
  padding:10px 16px;border-radius:999px;
  font-size:12.5px;color:var(--text);
  opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;
  z-index:50;max-width:calc(100% - 32px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media (max-width: 820px){
  :root{--sidebar-w:0px;}
  #sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);box-shadow:20px 0 60px rgba(0,0,0,0.5);}
  .menu-btn{display:flex;}
  #chatbar{left:0;}
  .metric-card{padding:11px 10px;}
  .metric-value{font-size:18px;}
  .metric-label{font-size:9px;}
  #canvas{padding:14px 14px 160px;}
  .canvas-title{font-size:18px;}
}
@media (max-width: 420px){
  .metric-value{font-size:16px;}
}
</style>
</head>
<body>

<div id="app">

  <aside id="sidebar">
    <div class="sidebar-top">
      <div class="from-pill"><span class="from-pill-dot"></span><span>From <span id="ownerFirst">Travis</span></span></div>
      <div class="brand-row">
        <div class="brand-mark">M</div>
        <div>
          <div class="brand-name">MAWD</div>
          <div class="brand-by">by Fanded</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-bottom">
      <button class="settings-btn" onclick="openSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </button>
    </div>
  </aside>
  <div id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

  <div id="main">
    <div id="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="view-title" id="viewTitle">Today</div>
      </div>
      <div class="listening"><span class="listening-dot"></span><span>listening</span></div>
    </div>
    <div id="gradLine"></div>

    <div id="canvas"></div>

    <div id="chatbar">
      <div class="chatbar-inner">
        <input id="chatInput" type="text" placeholder="Ask MAWD anything..." autocomplete="off"/>
        <button class="send-btn" onclick="sendMessage()" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="chatbar-foot">MAWD learns what you approve, skip, and ask for. It gets better every week.</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
var ROLES = {
  founder: {
    label:'Founder',
    sidebar:[
      {key:'investors',label:'Investors',color:'c-1',primary:true,
        dossierEyebrow:'THE RAISE',dossierTitle:'Who has gone cold on you?',
        dossierSub:'MAWD scanned your inbox for investor threads. Here is who asked for updates, who went quiet, and who you still owe a reply.'},
      {key:'pipeline',label:'Pipeline',color:'c-2',
        preview:{title:'Pipeline',desc:'Every live business conversation in one place: ICs, warm intros, follow-ups. MAWD auto-tags stage (Intro to Pitch to DD to Commit to Cold) from your emails.',items:['Stage detection from thread language','Days-since-last-touch per contact','Suggested re-engage templates per stage']}},
      {key:'traction',label:'Traction',color:'c-3',
        preview:{title:'Traction',desc:'Your growth numbers synthesized across Stripe, analytics, and user interviews. The proof points you repeat on every investor call.',items:['MRR, users, retention at a glance','Narrative beats pulled from user emails','Quote bank for pitch decks']}},
      {key:'raise',label:'Raise',color:'c-4',
        preview:{title:'Raise',desc:'Your round at a glance: committed, soft-circled, open slots. MAWD tracks valuation, SAFE terms, and total raised in real time.',items:['Committed vs soft-circled dollar tracker','Auto-drafted update emails to existing investors','Close-date countdown + reminder cadence']}},
      {key:'journal',label:'Journal',color:'c-6',
        preview:{title:'Journal',desc:'Voice-note to the team and investors. Record. MAWD transcribes, summarizes, and sends as a crisp update.',items:['Weekly founder update from voice memos','Monthly investor update auto-drafted','Decision log with searchable transcripts']}}
    ]
  },
  influencer: {
    label:'Influencer',
    sidebar:[
      {key:'brands',label:'Brands',color:'c-1',primary:true,
        dossierEyebrow:'BRAND DEALS',dossierTitle:'Who went cold mid-negotiation?',
        dossierSub:'MAWD pulled every brand conversation in your inbox. Here is who pitched, who ghosted, and what money is still on the table.'},
      {key:'deals',label:'Deals',color:'c-2',
        preview:{title:'Deals',desc:'Active deals, stalled ones, and ones that slipped. MAWD tracks every campaign from pitch to payment.',items:['Deal stage tracking (Pitch to Brief to Contract to Shipped to Paid)','Rate-card adherence flag when brands lowball','Payment due dates with auto-reminder']}},
      {key:'audience',label:'Audience',color:'c-3',
        preview:{title:'Audience',desc:'Your followers, engagement, and fan LTV across platforms. The numbers brands ask for, ready to paste.',items:['Cross-platform follower + engagement rate','Top 1% fans pulled from comments and DMs','Auto-generated media kit PDF']}},
      {key:'rate-card',label:'Rate Card',color:'c-4',
        preview:{title:'Rate Card',desc:'Your current rates, recent deal sizes, and what brands actually paid. MAWD benchmarks every incoming offer.',items:['Rolling average paid rate by deliverable','Do not take less than X floor alert','One-tap send of current rate card PDF']}},
      {key:'journal',label:'Journal',color:'c-6',
        preview:{title:'Journal',desc:'Voice-note your week. MAWD turns it into a weekly update for managers, agencies, or a closed circle.',items:['Weekly check-in summaries for your team','Searchable log of what you shot, posted, pitched','What happened this month PDF for reps']}}
    ]
  },
  actor: {
    label:'Actor',
    sidebar:[
      {key:'projects',label:'Projects',color:'c-1',primary:true,
        dossierEyebrow:'CASTING',dossierTitle:'Which projects stalled on you?',
        dossierSub:'MAWD read every casting and producer thread in your inbox. Here is who is waiting, who ghosted, and who still needs a reply.'},
      {key:'reps',label:'Reps',color:'c-2',
        preview:{title:'Reps',desc:'Every conversation with agents, managers, and lawyers centralized. Notes, check-in cadence, and context MAWD holds so you do not have to.',items:['Last-touched timer per rep','Auto-draft check-in when it has been too long','Contract deadlines flagged in advance']}},
      {key:'auditions',label:'Auditions',color:'c-3',
        preview:{title:'Auditions',desc:'Self-tape tracker, sides library, callback log. What booked, what did not, and why.',items:['Win rate by project type','Sides searchable by role, writer, production','Callback follow-up templates']}},
      {key:'network',label:'Network',color:'c-4',
        preview:{title:'Network',desc:'Directors, writers, casting you have worked with. MAWD remembers the last coffee, the last text, the last favor.',items:['Relationship strength scoring','Birthdays and milestones auto-tracked','Re-engage drafts in your voice']}},
      {key:'journal',label:'Journal',color:'c-6',

  musician: {

      {key:'collabs',label:'Collabs',color:'c-2',
        preview:{title:'Collabs',desc:'Every artist, producer, and feature conversation. Who replied, who went quiet, who still owes stems.',items:['Days-since-last-touch per collaborator','Stem + session file tracker','Re-engage drafts in your voice']}},
      {key:'sync',label:'Sync',color:'c-3',
        preview:{title:'Sync',desc:'Sync licensing opportunities: pitches sent, syncs landed, money still waiting. MAWD keeps the paper trail.',items:['Sync pitch tracker by song, supervisor','Publishing royalty reconciliation','Auto-generated one-sheets per track']}},
      {key:'touring',label:'Touring',color:'c-4',
        preview:{title:'Touring',desc:'Venue and promoter contacts, routing, fan density by market. Where the shows are and who to call.',items:['Fan density heatmap by city','Promoter contact book with last-touched','Routing suggestions from your listener map']}},
      {key:'journal',label:'Journal',color:'c-6',
        preview:{title:'Journal',desc:'Voice-note between sessions. MAWD turns it into fan letters, tour diaries, and posts in your voice.',items:['Fan letter drafts from voice memos','Tour diary auto-published to club members','Studio session log searchable by project']}}

  other: {
    label:'Other',
    sidebar:[
      {key:'relationships',label:'Relationships',color:'c-1',primary:true,
        dossierEyebrow:'YOUR PEOPLE',dossierTitle:'Who should you reconnect with?',
        dossierSub:'MAWD read your inbox for people who matter: paid you, hired you, replied fast, or waited too long. Here is who to re-engage.'},
      {key:'opportunities',label:'Opportunities',color:'c-2',
        preview:{title:'Opportunities',desc:'Inbound offers, warm intros, and leads MAWD pulls from your inbox before they go cold.',items:['Auto-tagged opportunity stages','Days-until-stale alerts','One-tap re-engage in your voice']}},
      {key:'pipeline',label:'Pipeline',color:'c-3',

      {key:'money',label:'Money',color:'c-4',

      {key:'journal',label:'Journal',color:'c-6',
        preview:{title:'Journal',desc:'Voice-note your day. MAWD keeps the record and can turn it into updates, recaps, or posts on request.',items:['Searchable voice-note archive','Auto-drafted weekly recaps','Decision log with transcripts']}}
    ]
  }
};

var state = {
  owner:{name:'Travis',email:'travis@fanded.com',role:'musician',specifically:''},
  activeView:null,
  dossier:null,
  drafts:[]
};

function loadOwner(){
  try { var saved = JSON.parse(localStorage.getItem('mawd_owner')||'{}'); if(saved&&saved.name) state.owner = Object.assign(state.owner, saved); } catch(e){}
}
function saveOwner(){ try { localStorage.setItem('mawd_owner', JSON.stringify(state.owner)); } catch(e){} }
function getRole(){ var r = (state.owner.role||'other').toLowerCase(); if(!ROLES[r]) r='other'; return r; }

function renderSidebar(){
  var role = ROLES[getRole()];
  var nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  role.sidebar.forEach(function(item){
    var el = document.createElement('div');
    el.className = 'nav-item' + (state.activeView === item.key ? ' active' : '');
    el.style.setProperty('--accent', 'var(--' + item.color + ')');
    el.setAttribute('data-key', item.key);
    var badgeHtml = '';
    if (item.primary && state.dossier && state.dossier.insights && state.dossier.insights.length) {
      badgeHtml = '<span class="nav-badge">' + state.dossier.insights.length + '</span>';
    } else if (!item.primary) {
      badgeHtml = '<span class="nav-coming">soon</span>';
    }
    el.innerHTML = navIcon(item.key) + '<span class="nav-label">' + item.label + '</span>' + badgeHtml;
    el.addEventListener('click', function(){ setView(item.key); });
    nav.appendChild(el);
  });
  document.getElementById('ownerFirst').textContent = (state.owner.name||'you').split(' ')[0];
}

function navIcon(key){
  var iconMap = {
    investors:'users',pipeline:'columns',traction:'trending-up',raise:'dollar',journal:'book-open',
    brands:'star',deals:'briefcase',audience:'users','rate-card':'file-text',
    projects:'film',reps:'phone',auditions:'mic',network:'share',
    fans:'heart',collabs:'music',sync:'radio',touring:'map',
    relationships:'users',opportunities:'target',money:'dollar'
  };
  var svgs = {
    users:'<circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="17" cy="7" r="3"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/>',

    music:'<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>',
    radio:'<circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/>',
    map:'<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>',
    star:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
    briefcase:'<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>',
    'file-text':'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
    film:'<rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/>',
    phone:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/>',
    mic:'<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>',
    share:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',
    target:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
    dollar:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
    'trending-up':'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',
    columns:'<path d="M12 3h7a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-7m0-18H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h7m0-18v18"/>',
    'book-open':'<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>'
  };
  var glyph = iconMap[key] || 'users';
  var path = svgs[glyph] || svgs.users;
  return '<span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+path+'</svg></span>';
}

function setView(key){
  state.activeView = key;
  var role = ROLES[getRole()];
  var item = role.sidebar.find(function(s){ return s.key === key; });
  renderSidebar();
  if (!item) return renderCanvasPrimary();
  document.getElementById('viewTitle').textContent = item.label;
  if (item.primary) renderCanvasPrimary(item);
  else renderCanvasComing(item);
  if (window.innerWidth <= 820) toggleSidebar(false);
  document.getElementById('canvas').scrollTop = 0;
}

function renderCanvasPrimary(item){
  var role = ROLES[getRole()];
  if (!item) item = role.sidebar.find(function(s){ return s.primary; });
  var d = state.dossier;
  var metricHtml = '';
  if (d && d.metrics && d.metrics.length) {
    metricHtml = '<div class="metric-grid">' + d.metrics.map(function(m,i){
      var accent = 'accent-' + (((i) % 4) + 1);
      return '<div class="metric-card '+accent+'"><div class="metric-value">'+m.value+'</div><div class="metric-label">'+m.label+'</div></div>';
    }).join('') + '</div>';
  } else {
    metricHtml = '<div class="metric-grid">' +
      '<div class="metric-card accent-1"><div class="metric-value">—</div><div class="metric-label">Connect Gmail</div></div>' +
      '<div class="metric-card accent-2"><div class="metric-value">—</div><div class="metric-label">To populate</div></div>' +
      '<div class="metric-card accent-3"><div class="metric-value">—</div><div class="metric-label">Your dossier</div></div>' +
    '</div>';
  }

  var insightHtml = '';
  if (d && d.insights && d.insights.length) {
    insightHtml = '<div class="section-label">What is live in your inbox</div>' +
      d.insights.map(function(ins){
        return '<div class="insight-card" onclick="draftFor(\''+ins.id+'\')">' +
          '<span class="insight-tag '+(ins.tagClass||'t-metric')+'">'+(ins.tag||'INSIGHT')+'</span>' +
          '<div class="insight-headline">'+ins.headline+'</div>' +
          (ins.sub ? '<div class="insight-sub">'+ins.sub+'</div>' : '') +
        '</div>';
      }).join('');
  } else {
    insightHtml = '<div class="section-label">What MAWD will surface once connected</div>' +
      '<div class="insight-card" onclick="scanInbox()">' +
        '<span class="insight-tag t-action">CONNECT</span>' +
        '<div class="insight-headline">Connect Gmail to populate this canvas with people from your inbox.</div>' +
        '<div class="insight-sub">MAWD reads every thread, tags who matters, and drafts re-engage messages you approve before anything sends.</div>' +
      '</div>' +
      '<div class="insight-card">' +
        '<span class="insight-tag t-pulse">NEXT</span>' +
        '<div class="insight-headline">Tap the chat bar and tell MAWD what you want to focus on first.</div>' +
        '<div class="insight-sub">Who in my inbox is still waiting for a reply? is a good opener.</div>' +
      '</div>';
  }

  var draftsHtml = state.drafts.map(renderDraftCard).join('');

  var canvas = document.getElementById('canvas');
  canvas.innerHTML =
    '<div class="canvas-header">' +
      '<div class="canvas-eyebrow">'+(item.dossierEyebrow||role.label.toUpperCase())+'</div>' +
      '<div class="canvas-title">'+(item.dossierTitle||'Your dossier')+'</div>' +
      '<div class="canvas-sub">'+(item.dossierSub||'')+'</div>' +
    '</div>' + metricHtml + insightHtml + draftsHtml;
}

function renderCanvasComing(item){
  var p = item.preview || {};
  var itemsHtml = (p.items||[]).map(function(x){ return '<li>'+x+'</li>'; }).join('');
  var primaryKey = ROLES[getRole()].sidebar.find(function(s){return s.primary;}).key;
  var canvas = document.getElementById('canvas');
  canvas.innerHTML =
    '<div class="canvas-header">' +
      '<div class="canvas-eyebrow">'+item.label.toUpperCase()+'</div>' +
      '<div class="canvas-title">'+(p.title||item.label)+'</div>' +
      '<div class="canvas-sub">This surface is coming right after the demo. Here is what will live here.</div>' +
    '</div>' +
    '<div class="coming-preview" style="--accent:var(--'+item.color+');">' +
      '<div class="coming-title"><span class="coming-soon-pill">Coming soon</span><span>'+(p.title||item.label)+'</span></div>' +
      '<div class="coming-body">'+(p.desc||'')+'</div>' +
      (itemsHtml ? '<ul>'+itemsHtml+'</ul>' : '') +
    '</div>' +
    '<div class="insight-card" onclick="setView(\''+primaryKey+'\')">' +
      '<span class="insight-tag t-action">GO BACK</span>' +
      '<div class="insight-headline">The dossier is where the work happens today.</div>' +
      '<div class="insight-sub">Tap to return to your primary view and see who is in your inbox.</div>' +
    '</div>';
}

function renderDraftCard(draft){
  return '<div class="draft-card" data-draft-id="'+draft.id+'">' +
    '<div class="draft-head">' +
      '<span class="draft-tag">Draft for your approval</span>' +
      '<span class="draft-context">'+(draft.contextPill||'')+'</span>' +
    '</div>' +
    '<div class="draft-to">To: <strong>'+escapeHtml(draft.to||'')+'</strong></div>' +
    '<div class="draft-subject">'+escapeHtml(draft.subject||'(no subject)')+'</div>' +
    '<textarea class="draft-body" onchange="updateDraftBody(\''+draft.id+'\', this.value)">'+escapeHtml(draft.body||'')+'</textarea>' +
    '<div class="draft-actions">' +
      '<button class="draft-btn primary" onclick="approveDraft(\''+draft.id+'\')">Approve and send</button>' +
      '<button class="draft-btn" onclick="rewriteDraft(\''+draft.id+'\')">Rewrite</button>' +
      '<button class="draft-btn ghost" onclick="skipDraft(\''+draft.id+'\')">Skip</button>' +
    '</div>' +
  '</div>';
}

function updateDraftBody(id, val){
  var d = state.drafts.find(function(x){ return x.id === id; });
  if (d) d.body = val;
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }

function sendMessage(){
  var input = document.getElementById('chatInput');
  var text = (input.value||'').trim();
  if (!text) return;
  input.value = '';
  pushInsight({tag:'YOU',tagClass:'t-you',headline:text,sub:'Asked just now'});
  callChat(text);
}
function pushInsight(ins){
  if (!state.dossier) state.dossier = {metrics:[],insights:[]};
  ins.id = ins.id || ('ins_'+Date.now()+'_'+Math.random().toString(36).slice(2,7));
  state.dossier.insights.unshift(ins);
  renderSidebar();
  renderCanvasPrimary();
}
function callChat(text){
  var role = getRole();
  fetch('/api/chat', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      messages:[{role:'user',content:text}],
      mode:'personal',
      mawd:{name:state.owner.name,email:state.owner.email,role:role,specifically:state.owner.specifically},
      assistantName:'MAWD'
    })
  }).then(function(r){ return r.json(); }).then(function(data){
    if (data && data.reply) {
      pushInsight({tag:'MAWD',tagClass:'t-pulse',headline:data.reply,sub:'Just now'});
      maybeExtractDraft(data.reply);
    } else if (data && data.error) {
      showToast('MAWD had trouble: ' + data.error);
    }
  }).catch(function(err){ showToast('Could not reach MAWD'); console.error(err); });
}
function maybeExtractDraft(text){
  var m = /(?:^|\n)To:\s*([^\n]+)\n(?:Subject:\s*([^\n]+)\n)?\n([\s\S]+)/i.exec(text||'');
  if (!m) return;
  addDraft({to:m[1].trim(),subject:(m[2]||'').trim(),body:m[3].trim(),contextPill:'From MAWD'});
}
function addDraft(d){
  d.id = 'd_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  state.drafts.unshift(d);
  renderCanvasPrimary();
}
function approveDraft(id){
  var d = state.drafts.find(function(x){ return x.id === id; });
  if (!d) return;
  showToast('Saving to Gmail Drafts...');
  fetch('/api/chat', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      messages:[{role:'user',content:'Save this as a Gmail draft (do not send):\nTo: '+d.to+'\nSubject: '+d.subject+'\n\n'+d.body}],
      mode:'personal',
      mawd:{name:state.owner.name,email:state.owner.email,role:getRole()},
      executeAction:true,
      assistantName:'MAWD'
    })
  }).then(function(r){ return r.json(); }).then(function(){
    showToast('Saved to Gmail Drafts');
    skipDraft(id);
  }).catch(function(){ showToast('Could not reach MAWD'); });
}
function rewriteDraft(id){
  var d = state.drafts.find(function(x){ return x.id === id; });
  if (!d) return;
  showToast('Asking MAWD to rewrite...');
  fetch('/api/chat', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      messages:[{role:'user',content:'Rewrite this email in my voice, shorter and warmer. Reply with only the rewritten body:\n\n'+d.body}],
      mode:'personal',
      mawd:{name:state.owner.name,email:state.owner.email,role:getRole()},
      assistantName:'MAWD'
    })
  }).then(function(r){ return r.json(); }).then(function(data){
    if (data && data.reply) { d.body = data.reply.trim(); renderCanvasPrimary(); showToast('Rewritten'); }
  });
}
function skipDraft(id){
  state.drafts = state.drafts.filter(function(x){ return x.id !== id; });
  renderCanvasPrimary();
}
function draftFor(insightId){
  var ins = (state.dossier&&state.dossier.insights||[]).find(function(i){ return i.id === insightId; });
  if (!ins || !ins.draftTarget) return;
  addDraft({to:ins.draftTarget.to,subject:ins.draftTarget.subject||'Catching up',body:ins.draftTarget.body||'',contextPill:ins.draftTarget.context||''});
}

function scanInbox(){
  showToast('MAWD is reading your inbox...');
  fetch('/api/chat?action=inbox-scan&role='+encodeURIComponent(getRole())+'&owner='+encodeURIComponent(state.owner.email))
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data && data.dossier) {
        state.dossier = data.dossier;
        renderSidebar();
        renderCanvasPrimary();
        showToast('Dossier updated');
      } else if (data && data.needsConnect) {
        showToast('Connect Gmail to scan your inbox');
      }
    })
    .catch(function(){ /* silent */ });
}

function toggleSidebar(force){
  var el = document.getElementById('sidebar');
  var ov = document.getElementById('sidebarOverlay');
  var open = force === undefined ? !el.classList.contains('open') : force;
  el.classList.toggle('open', open);
  ov.classList.toggle('open', open);
}
function openSettings(){
  var choice = prompt('Settings:\n1. Re-run onboarding\n2. Change role (current: '+getRole()+')\n3. Disconnect Gmail\n\nEnter 1, 2, or 3:');
  if (choice === '1') window.location.href = '/onboard.html';
  else if (choice === '2') {
    var r = prompt('Role (founder, influencer, actor, musician, other):', getRole());
    if (r && ROLES[r.toLowerCase()]) { state.owner.role = r.toLowerCase(); saveOwner(); renderSidebar(); setView(ROLES[getRole()].sidebar[0].key); }
  } else if (choice === '3') {
    localStorage.removeItem('mawd_gmail_refresh');
    showToast('Gmail disconnected');
  }
}
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

function needsOnboarding(){
  try {
    var saved = JSON.parse(localStorage.getItem('mawd_owner')||'null');
    return !saved || !saved.name || !saved.role;
  } catch(e){ return true; }
}

(function init(){
  var qp = new URLSearchParams(window.location.search);
  if (qp.get('name')) {
    state.owner.name = qp.get('name');
    state.owner.email = qp.get('email') || state.owner.email;
    state.owner.role = (qp.get('role')||state.owner.role).toLowerCase();
    state.owner.specifically = qp.get('specifically') || '';
    saveOwner();
    if (window.history && window.history.replaceState) {
      window.history.replaceState({}, '', window.location.pathname);
    }
  } else {
    loadOwner();
  }

  if (needsOnboarding()) {
    window.location.href = '/onboard.html';
    return;
  }

  var role = ROLES[getRole()];
  state.activeView = role.sidebar[0].key;
  document.getElementById('viewTitle').textContent = role.sidebar[0].label;
  renderSidebar();
  renderCanvasPrimary(role.sidebar[0]);

  document.getElementById('chatInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') sendMessage();
  });

  setTimeout(scanInbox, 400);
})();
</script>
